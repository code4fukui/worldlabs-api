<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SPZ Quest VR Viewer (Babylon.js WebXR) - Single HTML</title>
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#0f0f10; color:#eee; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #renderCanvas { width:100%; height:100%; touch-action:none; display:block; }
    #ui {
      position: fixed; left: 12px; top: 12px; z-index: 10;
      background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px; padding: 10px 12px; max-width: min(840px, calc(100vw - 24px));
      backdrop-filter: blur(6px);
    }
    #ui h1 { font-size: 14px; margin: 0 0 6px; font-weight: 650; }
    #ui .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    #ui button, #ui input[type="file"]::file-selector-button, #ui input[type="range"] {
      background:#222; color:#eee; border:1px solid rgba(255,255,255,.18);
      border-radius: 10px; padding: 7px 10px; cursor:pointer;
    }
    #ui button:hover, #ui input[type="file"]::file-selector-button:hover { background:#2a2a2a; }
    #ui small { display:block; opacity:.85; margin-top:6px; line-height:1.35; }
    #status { margin-left: 6px; opacity:.9; font-size: 12px; }
    #dropHint {
      position: fixed; inset: 0; display:none; place-items:center; z-index: 9;
      background: rgba(0,0,0,.55);
    }
    #dropHint .box{
      border: 2px dashed rgba(255,255,255,.35);
      border-radius: 18px; padding: 26px 22px; text-align:center;
      background: rgba(0,0,0,.35);
    }
    #dropHint .box b{ font-size: 18px; }
    .kv { display:flex; gap:10px; align-items:center; }
    .kv label { font-size:12px; opacity:.9; }
    .kv output { font-size:12px; opacity:.9; min-width: 70px; display:inline-block; }
  </style>

  <!-- Babylon.js + loaders -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>

<body>
  <div id="ui">
    <h1>SPZ Quest VR ビューワー（Babylon.js / WebXR）</h1>
    <div class="row">
      <input id="file" type="file" accept=".spz,.splat,.ply" />
      <button id="enterXR">VRに入る</button>
      <button id="exitXR" disabled>VRを出る</button>
      <button id="reset">原点へ</button>
      <button id="clear">クリア</button>
      <span id="status"></span>
    </div>

    <div>
    Pano: <a href=https://code4fukui.github.io/ar-vr360-viewer/#https://code4fukui.github.io/txt2splat/b197bd71-e2ca-4103-b559-55a14d767e90/image_pano.png>pano</a>
    </div>

    <div class="row" style="margin-top:8px">
      <div class="kv">
        <label>移動速度</label>
        <input id="speed" type="range" min="0.2" max="20" step="0.1" value="3" />
        <output id="speedOut"></output>
      </div>
      <div class="kv">
        <label>視界距離(maxZ)</label>
        <input id="maxz" type="range" min="200" max="100000" step="200" value="20000" />
        <output id="maxzOut"></output>
      </div>
      <div class="kv">
        <label>描画解像度</label>
        <input id="dpr" type="range" min="0.6" max="1.6" step="0.1" value="1.0" />
        <output id="dprOut"></output>
      </div>
    </div>

    <small>
      Quest: Oculus Browser で開いて「VRに入る」→ コントローラで移動/旋回。<br/>
      PC: クリックで見回し（ポインタロック）/ WASD移動 / Space上 / Ctrl(またはC)下 / Shift加速<br/>
      ※ WebXRは https / localhost が必要。巨大モデルは maxZ と DPR を調整。
    </small>
  </div>

  <div id="dropHint">
    <div class="box">
      <b>.spz / .splat / .ply</b><br/>
      ここにドロップして表示
    </div>
  </div>

  <canvas id="renderCanvas"></canvas>

  <script>
    (async () => {
      const canvas = document.getElementById("renderCanvas");
      const statusEl = document.getElementById("status");
      const dropHint = document.getElementById("dropHint");

      const speed = document.getElementById("speed");
      const speedOut = document.getElementById("speedOut");
      const maxz = document.getElementById("maxz");
      const maxzOut = document.getElementById("maxzOut");
      const dpr = document.getElementById("dpr");
      const dprOut = document.getElementById("dprOut");

      const enterXRBtn = document.getElementById("enterXR");
      const exitXRBtn = document.getElementById("exitXR");

      const setStatus = (s="") => (statusEl.textContent = s);
      const showDrop = (on) => (dropHint.style.display = on ? "grid" : "none");

      // Engine / Scene
      const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: false, stencil: true });
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.06, 0.06, 0.065, 1);

      // Lighting (splatsは不要だが補助)
      const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
      hemi.intensity = 0.8;

      // “PC用” 一人称（原点）
      const y = 0; // 1.6
      const cam = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, y, 0), scene);
      cam.setTarget(new BABYLON.Vector3(0, y, 1));
      cam.attachControl(canvas, true);
      cam.minZ = 0.02;
      cam.maxZ = Number(maxz.value);
      cam.angularSensibility = 800;

      // PCのWASD
      cam.keysUp = [87];    // W
      cam.keysDown = [83];  // S
      cam.keysLeft = [65];  // A
      cam.keysRight = [68]; // D

      // tiny axis at origin
      /*
      const axisSize = 1.0;
      const ax = BABYLON.MeshBuilder.CreateLines("axisX", { points: [BABYLON.Vector3.Zero(), new BABYLON.Vector3(axisSize,0,0)] }, scene);
      ax.color = new BABYLON.Color3(1,0,0);
      const ay = BABYLON.MeshBuilder.CreateLines("axisY", { points: [BABYLON.Vector3.Zero(), new BABYLON.Vector3(0,axisSize,0)] }, scene);
      ay.color = new BABYLON.Color3(0,1,0);
      const az = BABYLON.MeshBuilder.CreateLines("axisZ", { points: [BABYLON.Vector3.Zero(), new BABYLON.Vector3(0,0,axisSize)] }, scene);
      az.color = new BABYLON.Color3(0,0,1);
      */

      // Move states for PC (dt based)
      const keys = new Set();
      let isBoost = false, isUp = false, isDown = false;

      window.addEventListener("keydown", (e) => {
        keys.add(e.code);
        if (e.code === "ShiftLeft" || e.code === "ShiftRight") isBoost = true;
        if (e.code === "Space") isUp = true;
        if (e.code === "ControlLeft" || e.code === "ControlRight" || e.code === "KeyC") isDown = true;
      });
      window.addEventListener("keyup", (e) => {
        keys.delete(e.code);
        if (e.code === "ShiftLeft" || e.code === "ShiftRight") isBoost = false;
        if (e.code === "Space") isUp = false;
        if (e.code === "ControlLeft" || e.code === "ControlRight" || e.code === "KeyC") isDown = false;
      });

      // Pointer lock (PC)
      async function requestLock() { try { await canvas.requestPointerLock(); } catch {} }
      canvas.addEventListener("click", () => {
        // XR中は不要
        if (!xrHelper || !xrHelper.baseExperience || !xrHelper.baseExperience.state || xrHelper.baseExperience.state !== BABYLON.WebXRState.IN_XR) {
          if (document.pointerLockElement !== canvas) requestLock();
        }
      });

      // UI: performance / clip
      function updateUI() {
        cam.maxZ = Number(maxz.value);
        speedOut.value = `${Number(speed.value).toFixed(1)} m/s`;
        maxzOut.value = `${(cam.maxZ >= 1000) ? (cam.maxZ/1000).toFixed(1)+" km" : cam.maxZ.toFixed(0)+" m"}`;
        dprOut.value = `×${Number(dpr.value).toFixed(1)}`;
        engine.setHardwareScalingLevel(1 / Number(dpr.value)); // DPR調整（Questで効く）
      }
      speed.addEventListener("input", updateUI);
      maxz.addEventListener("input", updateUI);
      dpr.addEventListener("input", updateUI);
      updateUI();

      // Load container
      let currentContainer = null;
      async function clearSceneContent() {
        if (currentContainer) {
          try { currentContainer.removeAllFromScene(); } catch {}
          try { currentContainer.dispose(); } catch {}
          currentContainer = null;
        }
        setStatus("");
      }

      async function loadFile(file) {
        if (!file) return;
        const name = file.name || "";
        const lower = name.toLowerCase();
        const ext = lower.includes(".") ? lower.substring(lower.lastIndexOf(".")) : "";
        if (![".spz", ".splat", ".ply"].includes(ext)) {
          setStatus("未対応: " + name);
          return;
        }

        console.log(ext)
        const url = URL.createObjectURL(file);
        await loadURL(url);
      }
      async function loadURL(url) {
        const name = url;
        const lower = name.toLowerCase();
        const ext = lower.includes(".") ? lower.substring(lower.lastIndexOf(".")) : ".spz";
        console.log(ext)

        await clearSceneContent();
        setStatus("読み込み中: " + name);

        try {
          currentContainer = await BABYLON.SceneLoader.LoadAssetContainerAsync("", url, scene, undefined, ext);
          currentContainer.addAllToScene();
          setStatus("表示中: " + name + "（原点視点 / VR対応）");
        } catch (e) {
          console.error(e);
          setStatus("読み込み失敗: " + (e?.message || e));
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      document.getElementById("file").addEventListener("change", (ev) => loadFile(ev.target.files?.[0]));
      document.getElementById("reset").addEventListener("click", () => {
        const y = 0;
        cam.position.set(0, y, 0);
        cam.setTarget(new BABYLON.Vector3(0, y, 1));
      });
      document.getElementById("clear").addEventListener("click", clearSceneContent);

      // Drag & drop
      window.addEventListener("dragover", (e) => { e.preventDefault(); showDrop(true); });
      window.addEventListener("dragleave", (e) => { e.preventDefault(); showDrop(false); });
      window.addEventListener("drop", (e) => {
        e.preventDefault(); showDrop(false);
        const f = e.dataTransfer?.files?.[0];
        if (f) loadFile(f);
      });

      // --- WebXR (Quest) ---
      let xrHelper = null;

      async function initXRIfNeeded() {
        if (xrHelper) return xrHelper;

        // WebXR supported?
        const xrSupported = await BABYLON.WebXRSessionManager.IsSessionSupportedAsync("immersive-vr").catch(() => false);
        if (!xrSupported) {
          setStatus("このブラウザは immersive-vr をサポートしていません（QuestのOculus Browser推奨）");
          return null;
        }

        // Create default XR experience
        xrHelper = await scene.createDefaultXRExperienceAsync({
          uiOptions: { sessionMode: "immersive-vr" },
          // ルームスケール系の床検出は不要なら off にして軽くする
          optionalFeatures: true
        });

        // VR内のカメラの視界距離も巨大向けに
        xrHelper.baseExperience.camera.minZ = 0.02;
        xrHelper.baseExperience.camera.maxZ = cam.maxZ;

        // Enter/Exit hooks
        xrHelper.baseExperience.onStateChangedObservable.add((state) => {
          const inXR = (state === BABYLON.WebXRState.IN_XR);
          enterXRBtn.disabled = inXR;
          exitXRBtn.disabled = !inXR;

          // XR camera has its own; keep clipping synced
          if (inXR) {
            xrHelper.baseExperience.camera.maxZ = cam.maxZ;
            // 原点に“立つ”開始：床がある想定なら y=0 を床にして 1.6m
            xrHelper.baseExperience.camera.position = new BABYLON.Vector3(0, 1.6, 0);
          }
        });

        // Locomotion: コントローラのスティック移動＆旋回（Quest向け）
        // BabylonのWebXRControllerComponent を使って手動実装（依存少なめ）
        const speedMetersPerSec = () => Number(speed.value);
        const turnSpeedRadPerSec = () => 1.6; // 旋回速度（固定）

        scene.onBeforeRenderObservable.add(() => {
          if (!xrHelper) return;
          if (xrHelper.baseExperience.state !== BABYLON.WebXRState.IN_XR) return;

          const xrCam = xrHelper.baseExperience.camera;
          xrCam.maxZ = cam.maxZ;

          const dt = engine.getDeltaTime() / 1000;

          // ゲームパッド入力（左右スティック）をざっくり拾う
          // Oculus Browser / WebXR だと inputSources に gamepad がぶら下がる
          const session = xrHelper.baseExperience.sessionManager.session;
          if (!session) return;

          for (const src of session.inputSources) {
            const gp = src.gamepad;
            if (!gp || !gp.axes) continue;

            // 一般的に:
            // 左スティック: axes[2], axes[3]  または axes[0], axes[1]
            // 右スティック: axes[0], axes[1] など機種で揺れるので両方試す
            const ax0 = gp.axes[0] ?? 0;
            const ay0 = gp.axes[1] ?? 0;
            const ax2 = gp.axes[2] ?? 0;
            const ay3 = gp.axes[3] ?? 0;

            // “移動”は大きい方を採用（どっちが左スティックでも動くように）
            const moveX = (Math.abs(ax2) + Math.abs(ay3) > Math.abs(ax0) + Math.abs(ay0)) ? ax2 : ax0;
            const moveY = (Math.abs(ax2) + Math.abs(ay3) > Math.abs(ax0) + Math.abs(ay0)) ? ay3 : ay0;

            // 右スティック相当を“旋回”に使う：残りのほう
            const turnX = (Math.abs(ax2) + Math.abs(ay3) > Math.abs(ax0) + Math.abs(ay0)) ? ax0 : ax2;

            const dead = 0.15;
            const mx = Math.abs(moveX) < dead ? 0 : moveX;
            const my = Math.abs(moveY) < dead ? 0 : moveY;
            const tx = Math.abs(turnX) < dead ? 0 : turnX;

            // 移動：視線方向（水平）に前後 + 右方向
            if (mx !== 0 || my !== 0) {
              const forward = xrCam.getDirection(BABYLON.Axis.Z);
              const right = xrCam.getDirection(BABYLON.Axis.X);
              forward.y = 0; right.y = 0;
              forward.normalize(); right.normalize();

              const v = forward.scale(-my).add(right.scale(mx)); // myは下が+なので符号反転
              if (v.lengthSquared() > 0) {
                v.normalize().scaleInPlace(speedMetersPerSec() * dt);
                xrCam.position.addInPlace(v);
              }
            }

            // 旋回：Y軸回転（スナップではなくスムーズ）
            if (tx !== 0) {
              xrCam.rotationQuaternion = xrCam.rotationQuaternion || BABYLON.Quaternion.Identity();
              const yaw = -tx * turnSpeedRadPerSec() * dt;
              const q = BABYLON.Quaternion.FromEulerAngles(0, yaw, 0);
              xrCam.rotationQuaternion = q.multiply(xrCam.rotationQuaternion);
            }
          }
        });

        return xrHelper;
      }

      enterXRBtn.addEventListener("click", async () => {
        setStatus("VR初期化中...");
        const xr = await initXRIfNeeded();
        if (!xr) return;
        try {
          await xr.baseExperience.enterXRAsync("immersive-vr", "local-floor");
          setStatus("VR中: スティックで移動/旋回");
        } catch (e) {
          console.error(e);
          setStatus("VR開始に失敗: " + (e?.message || e));
        }
      });

      exitXRBtn.addEventListener("click", async () => {
        if (!xrHelper) return;
        try {
          await xrHelper.baseExperience.exitXRAsync();
          setStatus("VR終了");
        } catch {}
      });

      // Render loop
      scene.onBeforeRenderObservable.add(() => {
        // PC移動（XR中は動かさない）
        if (xrHelper && xrHelper.baseExperience.state === BABYLON.WebXRState.IN_XR) return;

        const dt = engine.getDeltaTime() / 1000;
        const base = Number(speed.value);
        const mul = isBoost ? 6 : 1; // PC Shift加速固定
        const spd = base * mul;

        const forward = cam.getDirection(BABYLON.Axis.Z);
        const right = cam.getDirection(BABYLON.Axis.X);
        forward.y = 0; right.y = 0;
        forward.normalize(); right.normalize();

        const move = new BABYLON.Vector3(0,0,0);
        if (keys.has("KeyW")) move.addInPlace(forward);
        if (keys.has("KeyS")) move.subtractInPlace(forward);
        if (keys.has("KeyA")) move.subtractInPlace(right);
        if (keys.has("KeyD")) move.addInPlace(right);

        if (move.lengthSquared() > 0) {
          move.normalize().scaleInPlace(spd * dt);
          cam.position.addInPlace(move);
        }
        if (isUp) cam.position.y += spd * dt;
        if (isDown) cam.position.y -= spd * dt;
      });

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      setStatus("ファイルを選択/ドロップ → Questなら「VRに入る」 / PCならクリックで見回し");

      const id = "6f0f0fed-5ed1-4078-bf28-eb9e9324204e";
      // const id = "7e6e5204-6904-4e3c-862c-5e3e34ecb98f";
      const dir = "sample";
      const url = location.hash.substring(1) || "./" + dir + "/" + id + "/splats_500k.spz";
      if (url) {
        loadURL(url);
      }
    })();
  </script>
</body>
</html>
